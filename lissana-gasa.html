<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ලිස්සන ගස - මිෂන් 10 (Responsive)</title>
    <style>
        :root {
            --primary-color: #d35400;
            --success-color: #27ae60;
            --pole-color: #5d4037;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #e0f7fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header info responsive */
        .header-info {
            width: 90%;
            max-width: 400px;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            border-radius: 15px;
            margin: 15px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .header-info h2 { margin: 5px 0; font-size: 1.5rem; color: #8b0000; }
        .header-info p { margin: 5px 0; font-size: 1rem; }

        /* Game container responsive */
        #game-area {
            position: relative;
            width: 85vw;
            max-width: 320px;
            height: 50vh; /* Screen එකේ උසෙන් භාගයක් ගසට */
            min-height: 300px;
            max-height: 500px;
            background: linear-gradient(#81d4fa, #fff);
            border-bottom: 12px solid #4caf50;
            display: flex;
            justify-content: center;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        #pole {
            width: 20px;
            height: 100%;
            background: linear-gradient(to right, #5d4037, #795548, #5d4037);
            position: relative;
        }

        #flag { 
            position: absolute; 
            top: 5px; 
            left: 12px; 
            font-size: 2.5rem; 
            z-index: 2;
        }

        #player {
            position: absolute;
            bottom: 0px; 
            left: -12px;
            font-size: 2.5rem;
            transition: bottom 0.05s ease-out; 
            z-index: 5;
            user-select: none;
        }

        /* Controls responsive */
        .controls {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
        }

        #climb-btn {
            width: 70%;
            max-width: 250px;
            padding: 15px 0;
            font-size: 1.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 6px #a04000;
            transition: 0.1s;
            touch-action: manipulation; /* Mobile zoom වැළැක්වීමට */
        }

        #climb-btn:active { 
            transform: translateY(4px); 
            box-shadow: 0 2px #a04000; 
        }

        #next-btn {
            display: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            background-color: var(--success-color);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .back-link { margin-bottom: 30px; color: #8b0000; text-decoration: none; font-weight: bold; border-bottom: 2px solid #8b0000;}

        /* Music Styles */
        .music-control {
            position: fixed; 
            bottom: 15px; 
            right: 15px;
            background: #f1c40f; 
            padding: 8px 15px; 
            border-radius: 50px;
            cursor: pointer; 
            font-weight: bold; 
            font-size: 0.8rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Landscape mode optimization for mobile */
        @media (max-height: 500px) {
            #game-area { height: 40vh; }
            .header-info { margin: 5px 0; padding: 5px; }
            h1 { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="header-info">
        <h2 id="mission-title">Mission 1</h2>
        <p id="message">කොඩිය අල්ලන්න! (නගින්න ඔබන්න)</p>
    </div>

    <div id="game-area">
        <div id="pole">
            <div id="flag">🚩</div> 
            <div id="player">🧗</div> 
        </div>
    </div>

    <div class="controls">
        <button id="climb-btn">නගින්න! 👆</button>
        <button id="next-btn" onclick="startNextMission()">ඊළඟ මිෂන් එක →</button>
        <a href="games.html" class="back-link">← ආපසු මණ්ඩපයට</a>
    </div>

    <audio id="avuruduAudio" loop><source src="avurudu_song.mp3" type="audio/mpeg"></audio>

    <div class="music-control" onclick="toggleMusic()">
        <span id="musicIcon">🎵</span>
        <span id="musicText">Music</span>
    </div>

    <script>
        let currentMission = 1;
        let position = 0;
        let isWin = false;
        
        const gameArea = document.getElementById('game-area');
        const player = document.getElementById('player');
        const message = document.getElementById('message');
        const missionTitle = document.getElementById('mission-title');
        const nextBtn = document.getElementById('next-btn');
        const climbBtn = document.getElementById('climb-btn');

        // ප්ලේයර් කොඩිය ගාවටම යන උස (Dynamic calculation)
        function getTouchPoint() {
            return gameArea.clientHeight - 65; 
        }

        let TOUCH_POINT = getTouchPoint();

        // ලිස්සන වේගයන්
        const missions = [
            { slip: 2 }, { slip: 4 }, { slip: 6 }, 
            { slip: 9 }, { slip: 12 }, { slip: 15 }, 
            { slip: 18 }, { slip: 22 }, { slip: 26 }, 
            { slip: 31 } 
        ];

        const CLIMB_POWER = 35; 

        // Window resize වෙද්දී TOUCH_POINT එක නැවත සකසනවා
        window.addEventListener('resize', () => {
            TOUCH_POINT = getTouchPoint();
            if (isWin) position = TOUCH_POINT;
            updateUI();
        });

        climbBtn.addEventListener('mousedown', climbAction);
        climbBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Mobile double tap zoom වැළැක්වීමට
            climbAction();
        });

        function climbAction() {
            if (isWin) return;
            position += CLIMB_POWER; 
            if (position > TOUCH_POINT) position = TOUCH_POINT;
            updateUI();
            checkCollision(); 
        }

        // ලිස්සන Logic එක
        setInterval(() => {
            if (!isWin && position > 0) {
                position -= missions[currentMission - 1].slip;
                updateUI();
            }
        }, 100);

        function updateUI() {
            if (position < 0) position = 0;
            player.style.bottom = position + "px";
        }

        function checkCollision() {
            if (position >= TOUCH_POINT) {
                isWin = true;
                player.style.bottom = TOUCH_POINT + "px"; 

                message.innerText = "ජයග්‍රහණයයි! 🚩";
                message.style.color = "#27ae60";
                climbBtn.style.display = "none";
                
                if(currentMission < 10) {
                    nextBtn.style.display = "block";
                } else {
                    message.innerText = "සියලුම මිෂන් අවසන්! ඔබ වීරයෙක්! 🏆";
                }
            }
        }

        function startNextMission() {
            currentMission++;
            position = 0;
            isWin = false;
            
            missionTitle.innerText = "Mission " + currentMission;
            message.innerText = "කොඩිය අල්ලන්න!";
            message.style.color = "black";
            nextBtn.style.display = "none";
            climbBtn.style.display = "block";
            updateUI();
        }

        // --- Music Controls ---
        const audio = document.getElementById("avuruduAudio");
        const musicIcon = document.getElementById("musicIcon");

        window.addEventListener("load", () => {
            const isPlaying = localStorage.getItem("musicPlaying") === "true";
            const lastTime = localStorage.getItem("musicTime");
            if (lastTime) audio.currentTime = parseFloat(lastTime);
            if (isPlaying) {
                audio.play().then(() => updateUI_Music(true)).catch(() => {});
            }
        });

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                localStorage.setItem("musicPlaying", "true");
                updateUI_Music(true);
            } else {
                audio.pause();
                localStorage.setItem("musicPlaying", "false");
                updateUI_Music(false);
            }
        }

        function updateUI_Music(isPlaying) {
            musicIcon.innerText = isPlaying ? "⏸️" : "🎵";
        }

        audio.addEventListener("timeupdate", () => {
            localStorage.setItem("musicTime", audio.currentTime);
        });
    </script>
</body>
</html>
