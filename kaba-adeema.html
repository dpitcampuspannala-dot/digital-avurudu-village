<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>කඹ ඇදීම - ඩිජිටල් අවුරුදු</title>
    <style>
        :root {
            --ground-color: #8bc34a;
            --rope-color: #795548;
            --btn-red: #d32f2f;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #fff9c4;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header Info Responsive */
        .header-info {
            width: 90%;
            max-width: 500px;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            border-radius: 20px;
            margin: 15px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 2px solid #fbc02d;
            z-index: 10;
        }
        .header-info h2 { margin: 5px 0; font-size: clamp(1.2rem, 5vw, 1.8rem); color: #f57f17; }
        .header-info p { margin: 5px 0; font-size: clamp(0.9rem, 3.5vw, 1.1rem); font-weight: bold; }

        /* Game Area Responsive */
        #game-area {
            position: relative;
            width: 95vw;
            max-width: 800px;
            height: 35vh;
            min-height: 250px;
            background-color: var(--ground-color);
            border: 8px solid #5d4037;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* මැද ඉර */
        #center-line {
            position: absolute;
            left: 50%;
            width: clamp(3px, 1vw, 6px);
            height: 100%;
            background-color: white;
            transform: translateX(-50%);
            z-index: 1;
        }

        /* කඹය */
        #rope {
            position: absolute;
            width: 200%; 
            height: clamp(8px, 2vw, 12px);
            background: repeating-linear-gradient(90deg, var(--rope-color), var(--rope-color) 10px, #8d6e63 10px, #8d6e63 20px);
            left: -50%; 
            display: flex;
            align-items: center;
            justify-content: center;
            transition: left 0.1s linear;
        }

        /* මැද රතු ලේන්සුව */
        #flag {
            width: clamp(15px, 4vw, 25px);
            height: clamp(25px, 6vw, 40px);
            background-color: red;
            position: absolute;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* කණ්ඩායම් */
        .team {
            font-size: clamp(35px, 12vw, 65px);
            position: absolute;
            display: flex;
            gap: 5px;
            white-space: nowrap;
        }

        #team-left { right: 55%; } /* කඹයේ මැදට සාපේක්ෂව */
        #team-right { left: 55%; transform: scaleX(-1); }

        /* පාලක */
        .controls {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
        }

        .pull-btn {
            width: 80%;
            max-width: 300px;
            padding: 15px 0;
            font-size: 1.5rem;
            background-color: var(--btn-red);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 6px #b71c1c;
            touch-action: manipulation; /* Mobile zoom වැළැක්වීමට */
        }

        .pull-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px #b71c1c;
        }

        #next-btn {
            display: none;
            padding: 12px 35px;
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .back-link { margin-bottom: 30px; color: #5d4037; text-decoration: none; font-weight: bold; border-bottom: 2px solid #5d4037; }

        /* Music */
        .music-control {
            position: fixed; bottom: 20px; right: 20px;
            background-color: #f1c40f; color: #8b0000;
            padding: 10px 15px; border-radius: 50px;
            cursor: pointer; display: flex; align-items: center;
            gap: 8px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000; font-size: 0.9rem;
        }

        /* Landscape optimization */
        @media (max-height: 500px) {
            #game-area { height: 45vh; }
            .team { font-size: 40px; }
            .header-info { margin: 5px 0; }
        }
    </style>
</head>
<body>

    <div class="header-info">
        <h2 id="mission-title">මිෂන් 1</h2>
        <p id="message">"අදින්න!" බොත්තම වේගයෙන් ඔබන්න!</p>
    </div>

    <div id="game-area">
        <div id="center-line"></div>
        <div id="rope">
            <div id="team-left" class="team">👨‍🌾👨‍🌾</div>
            <div id="flag"></div>
            <div id="team-right" class="team">👨‍🌾👨‍🌾</div>
        </div>
    </div>

    <div class="controls">
        <button id="pull-btn" class="pull-btn" onclick="playerPull()">අදින්න! 🏃‍♂️</button>
        <button id="next-btn" onclick="startNextMission()">ඊළඟ මිෂන් එක →</button>
        <a href="games.html" class="back-link">← ආපසු මණ්ඩපයට</a>
    </div>

    <audio id="avuruduAudio" loop><source src="avurudu_song.mp3" type="audio/mpeg"></audio>

    <div class="music-control" onclick="toggleMusic()">
        <span id="musicIcon">🎵</span>
        <span id="musicText">Music</span>
    </div>

    <script>
        let currentMission = 1;
        let ropePos = -50; 
        let isWin = false;
        let isGameOver = false;

        const missions = [
            { compPower: 0.25 }, { compPower: 0.45 }, { compPower: 0.65 },
            { compPower: 0.90 }, { compPower: 1.20 }, { compPower: 1.50 },
            { compPower: 1.90 }, { compPower: 2.30 }, { compPower: 2.80 }, { compPower: 3.50 }
        ];

        const rope = document.getElementById('rope');
        const message = document.getElementById('message');
        const nextBtn = document.getElementById('next-btn');
        const pullBtn = document.getElementById('pull-btn');

        // ප්ලේයර් ඇදීම (Mobile support සමඟ)
        function playerPull() {
            if (isGameOver) return;
            ropePos -= 2.0; // ප්ලේයර් ශක්තිය
            updateRope();
            checkWin();
        }

        // පරිගණකය ඇදීම
        setInterval(() => {
            if (!isGameOver) {
                ropePos += missions[currentMission - 1].compPower; 
                updateRope();
                checkWin();
            }
        }, 100);

        function updateRope() {
            rope.style.left = ropePos + "%";
        }

        function checkWin() {
            // ප්ලේයර් දිනුවොත්
            if (ropePos <= -68) {
                isGameOver = true;
                isWin = true;
                message.innerText = "නියමයි! ඔබ ජයග්‍රහණය කළා! 🎉";
                message.style.color = "green";
                if (currentMission < 10) nextBtn.style.display = "block";
                else message.innerText = "ඔබ කඹ ඇදීමේ මහා ශූරයායි! 🏆";
                pullBtn.style.visibility = "hidden";
            }
            // පරිගණකය දිනුවොත්
            else if (ropePos >= -32) {
                isGameOver = true;
                message.innerText = "අපොයි! ඔබව ඇදගත්තා. ❌";
                message.style.color = "red";
                setTimeout(resetMission, 2000);
            }
        }

        function resetMission() {
            ropePos = -50;
            isGameOver = false;
            isWin = false;
            pullBtn.style.visibility = "visible";
            nextBtn.style.display = "none";
            message.innerText = 'වේගයෙන් "අදින්න!" බොත්තම ඔබන්න!';
            message.style.color = "black";
            updateRope();
        }

        function startNextMission() {
            currentMission++;
            document.getElementById('mission-title').innerText = "මිෂන් " + currentMission;
            resetMission();
        }

        // Music Logic
        const audio = document.getElementById("avuruduAudio");
        const musicIcon = document.getElementById("musicIcon");

        function toggleMusic() {
            if (audio.paused) {
                audio.play(); localStorage.setItem("musicPlaying", "true"); musicIcon.innerText = "⏸️";
            } else {
                audio.pause(); localStorage.setItem("musicPlaying", "false"); musicIcon.innerText = "🎵";
            }
        }

        window.addEventListener("load", () => {
            const isPlaying = localStorage.getItem("musicPlaying") === "true";
            const lastTime = localStorage.getItem("musicTime");
            if (lastTime) audio.currentTime = parseFloat(lastTime);
            if (isPlaying) { audio.play().catch(() => {}); musicIcon.innerText = "⏸️"; }
        });

        audio.addEventListener("timeupdate", () => localStorage.setItem("musicTime", audio.currentTime));
    </script>
</body>
</html>
