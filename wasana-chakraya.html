<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>වාසනා චක්‍රය - ඩිජිටල් අවුරුදු ගම්මානය</title>
    <style>
        :root {
            --primary-red: #8b0000;
            --gold: #FFD700;
            --orange: #e67e22;
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #fdf2e9; 
            text-align: center; 
            color: #333; 
            overflow-x: hidden; 
        }

        .container { 
            width: 95%; 
            max-width: 800px; 
            margin: 20px auto; 
            padding: 10px; 
            box-sizing: border-box;
        }

        h1 { 
            color: var(--primary-red); 
            margin-bottom: 20px; 
            font-size: clamp(1.8rem, 5vw, 2.5rem); 
        }
        
        /* Game Area Responsive */
        .game-area { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: white; 
            padding: clamp(20px, 5vw, 40px); 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            border: 4px solid var(--gold); 
            position: relative; 
            width: 100%;
            box-sizing: border-box;
        }

        /* Wheel Container Responsive */
        .wheel-container { 
            position: relative; 
            width: min(80vw, 400px); 
            height: min(80vw, 400px); 
            margin-bottom: 30px; 
        }

        .wheel { 
            width: 100%; height: 100%; 
            border-radius: 50%; 
            border: clamp(5px, 2vw, 10px) solid #d35400; 
            box-shadow: 0 0 20px rgba(0,0,0,0.2); 
            overflow: hidden; 
            position: relative;
            transition: transform 5s cubic-bezier(0.15, 0.05, 0.1, 1); 
        }
        
        .wheel::after {
            content: ''; position: absolute; top: 50%; left: 50%; 
            width: clamp(20px, 8vw, 35px); height: clamp(20px, 8vw, 35px); 
            background: white; border-radius: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 5; border: 4px solid #d35400; 
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .wheel-inner { 
            width: 100%; height: 100%; border-radius: 50%; 
            background: conic-gradient(
                #e74c3c 0deg 45deg, #3498db 45deg 90deg, #2ecc71 90deg 135deg, #f1c40f 135deg 180deg,
                #9b59b6 180deg 225deg, #e67e22 225deg 270deg, #1abc9c 270deg 315deg, #ecf0f1 315deg 360deg
            ); 
            position: relative;
            transform: rotate(-22.5deg); 
        }

        .segment-label { 
            position: absolute; width: 50%; height: 30px; top: 50%; left: 50%; 
            transform-origin: 0% 50%; display: flex; align-items: center; 
            padding-left: clamp(20px, 8vw, 45px); 
            color: white; font-weight: bold; 
            font-size: clamp(0.6rem, 2.5vw, 0.9rem); 
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8); 
            box-sizing: border-box; 
            transition: all 0.3s ease;
            pointer-events: none;
        }

        /* Winner Animation */
        @keyframes blinkWinner {
            0% { color: white; }
            50% { color: var(--gold); text-shadow: 0 0 15px var(--gold), 0 0 25px red; transform: scale(1.1); }
            100% { color: white; }
        }
        .segment-label.winner-blink {
            animation: blinkWinner 0.8s infinite;
            z-index: 20;
        }

        .btn-spin { 
            background-color: var(--orange); 
            color: white; 
            padding: 15px clamp(30px, 10vw, 50px); 
            border: none; border-radius: 50px; 
            font-weight: bold; font-size: clamp(1rem, 4vw, 1.4rem); 
            cursor: pointer; transition: 0.2s; 
            box-shadow: 0 5px 10px rgba(0,0,0,0.2); 
            touch-action: manipulation;
        }
        .btn-spin:hover { background-color: #d35400; transform: scale(1.05); }
        .btn-spin:disabled { background-color: #bdc3c7; cursor: not-allowed; transform: none; }

        /* Modal Responsive */
        #prizeModal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 2000; 
            align-items: center; justify-content: center; 
        }
        .modal-content { 
            background: white; padding: clamp(20px, 8vw, 40px); 
            border-radius: 20px; border: 5px solid var(--gold); 
            text-align: center; transform: scale(0.5); opacity: 0; 
            transition: all 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.49); 
            width: 85%; max-width: 450px; 
        }
        .modal-content.show { transform: scale(1); opacity: 1; }
        .prize-name { font-size: clamp(1.5rem, 6vw, 2.5rem); color: #27ae60; font-weight: bold; margin: 15px 0; display: block; }
        
        .close-btn { 
            background: var(--primary-red); color: white; border: none; 
            padding: 12px 35px; border-radius: 50px; cursor: pointer; 
            font-weight: bold; font-size: 1rem; 
        }

        .confetti { position: absolute; width: 10px; height: 10px; z-index: 2001; pointer-events: none; }

        /* Floating Music Button Responsive */
        .music-control {
            position: fixed; bottom: 20px; right: 20px;
            background-color: #f1c40f; color: var(--primary-red);
            padding: 10px 15px; border-radius: 50px;
            cursor: pointer; display: flex; align-items: center;
            gap: 8px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000; font-size: 0.85rem;
        }

        .back-link { 
            display: inline-block; margin: 30px 0; 
            color: var(--primary-red); text-decoration: none; 
            font-weight: bold; border-bottom: 2px solid var(--primary-red);
        }

        @media (max-width: 400px) {
            .game-area { padding: 15px; }
            .segment-label { padding-left: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>අවුරුදු වාසනා චක්‍රය</h1>
    
    <div class="game-area">
        <div class="wheel-container">
            <div id="wheel" class="wheel">
                <div class="wheel-inner" id="wheelInner"></div>
            </div>
        </div>
        <button class="btn-spin" id="spinBtn" onclick="spinWheel()">වාසනාව බලමු! 🎡</button>
    </div>

    <div id="prizeModal">
        <div class="modal-content" id="modalContent">
            <h2 id="modalTitle">සුභ පැතුම්! 🏆</h2>
            <span class="prize-name" id="modalPrizeText"></span>
            <p>ඔබට මෙම තෑග්ග හිමිවුණා.</p>
            <button class="close-btn" onclick="closeModal()">නියමයි!</button>
        </div>
    </div>

    <a href="games.html" class="back-link">← ආපසු මණ්ඩපයට</a>
</div>

<audio id="avuruduAudio" loop><source src="avurudu_song.mp3" type="audio/mpeg"></audio>

<div class="music-control" onclick="toggleMusic()">
    <span id="musicIcon">🎵</span>
    <span id="musicText">Music</span>
</div>

<script>
    const prizes = [
        { text: "කැවුම් පිඟානක් 🍪", win: true }, 
        { text: "කිරි බත් 🍚", win: true },       
        { text: "රු. 500ක් 💸", win: true },       
        { text: "අයෙත් කරකවන්න 🔄", win: false },  
        { text: "අවුරුදු ඇඳුමක් 👕", win: true },  
        { text: "පැණි බනිස් 🥯", win: true },       
        { text: "කොට්ට පොර ⚔️", win: true },       
        { text: "විශේෂ තෑග්ගක් 🎁", win: true }   
    ];

    const sliceAngle = 360 / prizes.length; 
    const wheelInner = document.getElementById('wheelInner');
    const wheel = document.getElementById('wheel');
    const spinBtn = document.getElementById('spinBtn');

    // ලේබල් එකතු කිරීම
    prizes.forEach((prize, i) => {
        const label = document.createElement('div');
        label.className = 'segment-label';
        label.innerText = prize.text;
        const rotation = (i * sliceAngle) + (sliceAngle / 2);
        label.style.transform = `translateY(-50%) rotate(${rotation}deg)`;
        wheelInner.appendChild(label);
    });

    let currentRotation = 0;

    function spinWheel() {
        spinBtn.disabled = true;
        document.querySelectorAll('.segment-label').forEach(lbl => lbl.classList.remove('winner-blink'));
        
        const extraRounds = Math.floor(Math.random() * 5) + 5; 
        const randomDegrees = Math.floor(Math.random() * 360);
        currentRotation += (extraRounds * 360) + randomDegrees;
        
        wheel.style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
            const actualDegree = currentRotation % 360;
            const normalizedDegree = (360 - actualDegree + 22.5) % 360;
            const winningIndex = Math.floor((normalizedDegree + 360) % 360 / sliceAngle);

            const labels = document.querySelectorAll('.segment-label');
            labels[winningIndex].classList.add('winner-blink');

            setTimeout(() => {
                showPrize(prizes[winningIndex]);
            }, 1500);

        }, 5000);
    }

    function showPrize(winner) {
        const modal = document.getElementById('prizeModal');
        const modalContent = document.getElementById('modalContent');
        const modalPrizeText = document.getElementById('modalPrizeText');
        const modalTitle = document.getElementById('modalTitle');

        modalPrizeText.innerText = winner.text;
        if(winner.win) {
            modalTitle.innerText = "සුභ පැතුම්! 🏆";
            modalPrizeText.style.color = "#27ae60";
            createConfetti();
        } else {
            modalTitle.innerText = "අයියෝ! 🔄";
            modalPrizeText.style.color = "#c0392b";
        }

        modal.style.display = 'flex';
        setTimeout(() => modalContent.classList.add('show'), 10);
    }

    function closeModal() {
        document.getElementById('modalContent').classList.remove('show');
        setTimeout(() => {
            document.getElementById('prizeModal').style.display = 'none';
            spinBtn.disabled = false;
            document.querySelectorAll('.confetti').forEach(c => c.remove());
        }, 400);
    }

    function createConfetti() {
        for (let i = 0; i < 50; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.backgroundColor = ['#f1c40f', '#e67e22', '#e74c3c', '#3498db', '#2ecc71'][Math.floor(Math.random() * 5)];
            document.body.appendChild(c);
            let p = -20;
            const s = Math.random() * 5 + 3;
            function fall() {
                p += s;
                c.style.top = p + 'px';
                if (p < window.innerHeight) requestAnimationFrame(fall);
                else c.remove();
            }
            fall();
        }
    }

    // Music Control Logic
    const audio = document.getElementById("avuruduAudio");
    const musicIcon = document.getElementById("musicIcon");

    function toggleMusic() {
        if (audio.paused) {
            audio.play(); localStorage.setItem("musicPlaying", "true"); musicIcon.innerText = "⏸️";
        } else {
            audio.pause(); localStorage.setItem("musicPlaying", "false"); musicIcon.innerText = "🎵";
        }
    }

    window.addEventListener("load", () => {
        const isPlaying = localStorage.getItem("musicPlaying") === "true";
        const lastTime = localStorage.getItem("musicTime");
        if (lastTime) audio.currentTime = parseFloat(lastTime);
        if (isPlaying) { audio.play().catch(() => {}); musicIcon.innerText = "⏸️"; }
    });

    audio.addEventListener("timeupdate", () => localStorage.setItem("musicTime", audio.currentTime));
</script>
</body>
</html>
