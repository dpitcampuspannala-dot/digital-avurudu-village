<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>කණා මුට්ටි බිඳීම - ඩිජිටල් අවුරුදු</title>
    <style>
        :root {
            --bg-color: #fce4ec;
            --header-bg: rgba(255, 255, 255, 0.9);
            --pot-color: #3498db;
            --ground-color: #7ed321;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header Info */
        .header-info {
            width: 90%;
            max-width: 500px;
            text-align: center;
            background: var(--header-bg);
            padding: 10px 15px;
            border-radius: 20px;
            margin: 15px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
        }
        .header-info h2 { margin: 5px 0; font-size: 1.5rem; color: #880e4f; }
        .header-info p { margin: 5px 0; font-size: 1rem; font-weight: bold; }

        /* Game Area Responsive */
        #game-area {
            position: relative;
            width: 95vw;
            max-width: 500px;
            height: 55vh;
            min-height: 350px;
            background: linear-gradient(#e3f2fd, #fff);
            border-bottom: 20px solid var(--ground-color);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* Pots Container */
        .pot-container {
            position: absolute;
            top: 20%;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .pot-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .pot { 
            font-size: clamp(30px, 8vw, 60px); /* මුට්ටි ගණන අනුව ප්‍රමාණය වෙනස් වේ */
            z-index: 2; 
            cursor: pointer;
            transition: transform 0.2s;
        }

        .falling-content {
            position: absolute;
            top: 40px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: none;
            z-index: 1;
        }

        @keyframes fallDown {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(200px) scale(2); opacity: 0; }
        }

        /* Player Wrapper */
        #player-wrapper {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            transition: left 0.15s ease-out;
        }

        #character-body {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #character {
            font-size: clamp(50px, 15vw, 80px);
            z-index: 5;
            transition: transform 0.2s;
        }

        #stick {
            position: absolute;
            bottom: 30px;
            left: 50px;
            width: 6px;
            height: 60px;
            background: #5d4037;
            border-radius: 4px;
            transform-origin: bottom center;
            transform: rotate(15deg);
            transition: transform 0.2s ease, left 0.2s;
            z-index: 6;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .swing-stick {
            transform: rotate(-110deg) translateY(-15px) !important;
        }

        /* Controls */
        .controls {
            width: 100%;
            max-width: 400px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn {
            padding: 15px;
            font-size: 1.2rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px #ccc;
            touch-action: manipulation;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #ccc; }
        .move-btn { background-color: #3498db; flex: 1; }
        .hit-btn { background-color: #e74c3c; flex: 2; font-size: 1.3rem; }
        
        #next-btn { 
            display: none; 
            background-color: var(--ground-color); 
            padding: 12px 30px;
            margin-bottom: 10px;
        }

        .back-link { margin: 15px 0 30px 0; color: #880e4f; text-decoration: none; font-weight: bold; border-bottom: 2px solid #880e4f; }

        /* Music */
        .music-control {
            position: fixed; bottom: 20px; right: 20px;
            background-color: #f1c40f; color: #8b0000;
            padding: 10px 15px; border-radius: 50px;
            cursor: pointer; display: flex; align-items: center;
            gap: 8px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000; font-size: 0.9rem;
        }

        /* Landscape fix for mobile */
        @media (max-height: 500px) {
            #game-area { height: 40vh; }
            #player-wrapper { width: 60px; height: 60px; bottom: 10px; }
            #character { font-size: 50px; }
            #stick { height: 40px; }
        }
    </style>
</head>
<body>

    <div class="header-info">
        <h2 id="mission-title">Mission 1</h2>
        <p id="message">මුට්ටියක් තෝරා පහර දෙන්න!</p>
    </div>

    <div id="game-area">
        <div class="pot-container" id="pots-wrapper"></div>
        <div id="player-wrapper">
            <div id="character-body">
                <div id="character">🚶‍♂️</div>
                <div id="stick"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn move-btn" onclick="move(-15)">←</button>
        <button class="btn hit-btn" onclick="hit()">පහර දෙන්න! 💥</button>
        <button class="btn move-btn" onclick="move(15)">→</button>
    </div>
    
    <button id="next-btn" class="btn" onclick="startNextMission()">ඊළඟ මිෂන් එක →</button>
    <a href="games.html" class="back-link">← ආපසු මණ්ඩපයට</a>

    <audio id="avuruduAudio" loop><source src="avurudu_song.mp3" type="audio/mpeg"></audio>

    <div class="music-control" onclick="toggleMusic()">
        <span id="musicIcon">🎵</span>
        <span id="musicText">Music</span>
    </div>

    <script>
        let currentMission = 1;
        let playerPos = 50; // Percentage
        let isWin = false;
        let winningPotIndex = 0;

        function initMission() {
            isWin = false;
            playerPos = 50;
            const playerWrapper = document.getElementById('player-wrapper');
            playerWrapper.style.left = playerPos + "%";
            
            const msg = document.getElementById('message');
            msg.innerText = "නිල් වතුර තියෙන මුට්ටිය සොයන්න!";
            msg.style.color = "black";
            document.getElementById('next-btn').style.display = "none";
            
            const wrapper = document.getElementById('pots-wrapper');
            wrapper.innerHTML = "";
            
            const missions = [
                { pots: 3 }, { pots: 3 }, { pots: 4 }, 
                { pots: 4 }, { pots: 5 }, { pots: 5 }, 
                { pots: 6 }, { pots: 7 }, { pots: 8 }, { pots: 10 }
            ];

            const count = missions[currentMission-1].pots;
            winningPotIndex = Math.floor(Math.random() * count);

            for (let i = 0; i < count; i++) {
                const potWrap = document.createElement('div');
                potWrap.className = 'pot-wrapper';
                
                const pot = document.createElement('div');
                pot.className = 'pot';
                pot.id = 'pot-' + i;
                pot.innerText = "🏺";
                
                // මුට්ටි ගොඩක් ඇති විට අකුරු කුඩා කිරීමට
                if (count > 6) pot.style.fontSize = "25px";

                const falling = document.createElement('div');
                falling.className = 'falling-content';
                falling.id = 'falling-' + i;
                falling.style.backgroundColor = (i === winningPotIndex) ? "#3498db" : "#9e9e9e";

                potWrap.appendChild(pot);
                potWrap.appendChild(falling);
                wrapper.appendChild(potWrap);
            }
        }

        function move(amount) {
            if (isWin) return;
            const char = document.getElementById('character');
            const stick = document.getElementById('stick');

            if (amount < 0) {
                char.style.transform = "scaleX(1)"; 
                stick.style.left = "0px"; 
            } else {
                char.style.transform = "scaleX(-1)"; 
                stick.style.left = "50px"; 
            }

            playerPos += amount / 2; 
            if (playerPos < 10) playerPos = 10;
            if (playerPos > 90) playerPos = 90;
            document.getElementById('player-wrapper').style.left = playerPos + "%";
        }

        function hit() {
            if (isWin) return;
            const stick = document.getElementById('stick');
            stick.classList.add('swing-stick');
            setTimeout(() => {
                checkHit();
                setTimeout(() => { stick.classList.remove('swing-stick'); }, 150);
            }, 200);
        }

        function checkHit() {
            const pots = document.getElementsByClassName('pot');
            const count = pots.length;
            const potWidth = 100 / count;
            let hitIndex = Math.floor(playerPos / potWidth);
            if (hitIndex >= count) hitIndex = count - 1;

            const pot = document.getElementById('pot-' + hitIndex);
            const falling = document.getElementById('falling-' + hitIndex);
            const msg = document.getElementById('message');

            pot.innerText = "💥";
            falling.style.display = "block";
            falling.style.animation = "fallDown 0.8s forwards";

            if (hitIndex === winningPotIndex) {
                isWin = true;
                msg.innerText = "නියමයි! නිල් වතුර හැලුණා! 🎉";
                msg.style.color = "#3498db";
                if (currentMission < 10) {
                    document.getElementById('next-btn').style.display = "block";
                } else {
                    msg.innerText = "ඔබ සියලුම මුට්ටි බින්දා! 🏆";
                }
            } else {
                msg.innerText = "අපොයි අළු! නැවත උත්සාහ කරන්න. ❌";
                msg.style.color = "#757575";
                setTimeout(() => {
                    if(!isWin) {
                        pot.innerText = "🏺";
                        falling.style.display = "none";
                        falling.style.animation = "none";
                    }
                }, 800);
            }
        }

        function startNextMission() {
            currentMission++;
            document.getElementById('mission-title').innerText = "Mission " + currentMission;
            initMission();
        }

        // Music
        const audio = document.getElementById("avuruduAudio");
        const musicIcon = document.getElementById("musicIcon");

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                localStorage.setItem("musicPlaying", "true");
                musicIcon.innerText = "⏸️";
            } else {
                audio.pause();
                localStorage.setItem("musicPlaying", "false");
                musicIcon.innerText = "🎵";
            }
        }

        window.addEventListener("load", () => {
            initMission();
            const isPlaying = localStorage.getItem("musicPlaying") === "true";
            if (isPlaying) {
                audio.play().catch(() => {});
                musicIcon.innerText = "⏸️";
            }
        });
    </script>
</body>
</html>
