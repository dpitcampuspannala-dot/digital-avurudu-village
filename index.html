<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>කැට ගැසීම - ඩිජිටල් අවුරුදු ගම්මානය</title>
    <style>
        :root {
            --primary-red: #8b0000;
            --gold: #FFD700;
            --orange: #e67e22;
            --wood: #a04000;
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #fdf2e9; 
            text-align: center; 
            color: #333; 
            overflow-x: hidden; 
        }

        .container { 
            width: 95%; 
            max-width: 800px; 
            margin: 20px auto; 
            padding: 10px; 
            box-sizing: border-box;
        }

        h1 { 
            color: var(--primary-red); 
            margin-bottom: 20px; 
            font-size: clamp(1.8rem, 5vw, 2.5rem); 
        }
        
        /* Game Area */
        .game-area { 
            background: white; 
            padding: clamp(20px, 5vw, 40px); 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            border: 4px solid var(--gold); 
            position: relative; 
            width: 100%;
            box-sizing: border-box;
        }

        /* Bet Selection */
        .bet-container { margin-bottom: 30px; }
        .bet-title { font-weight: bold; margin-bottom: 10px; display: block; font-size: 1.1rem;}
        .bet-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        
        .bet-btn {
            width: 50px; height: 50px; border-radius: 10px; border: 2px solid transparent;
            background: #eee; font-size: 1.5rem; font-weight: bold; cursor: pointer; transition: 0.2s;
            user-select: none;
        }
        .bet-btn:hover { background: #ddd; }
        .bet-btn.selected { background: var(--gold); color: var(--primary-red); border-color: var(--primary-red); transform: scale(1.1); }

        /* Keta Display */
        .keta-display { margin: 40px 0; min-height: 120px; position: relative; display: flex; justify-content: center; align-items: center;}
        
        #ketaResult { font-size: 6rem; transition: transform 0.5s; opacity: 1;}
        
        /* Animation class for rolling keta */
        .keta-rolling { animation: rollKeta 0.1s infinite; opacity: 0.8;}
        @keyframes rollKeta {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* Result Popup inside Keta Display */
        #resultMessage { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); border-radius: 10px;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 5; font-size: 1.5rem; font-weight: bold;
        }

        /* Toss Button */
        .btn-toss { 
            background-color: var(--orange); 
            color: white; 
            padding: 15px clamp(30px, 10vw, 50px); 
            border: none; border-radius: 50px; 
            font-weight: bold; font-size: clamp(1rem, 4vw, 1.3rem); 
            cursor: pointer; transition: 0.2s; 
            box-shadow: 0 5px 10px rgba(0,0,0,0.2); 
            touch-action: manipulation;
        }
        .btn-toss:hover { background-color: #d35400; transform: scale(1.05); }
        .btn-toss:disabled { background-color: #bdc3c7; cursor: not-allowed; transform: none; }

        /* Points and Score */
        .score-board { margin-top: 30px; font-weight: bold; font-size: 1.2rem; color: #555;}
        #pointsCount { color: var(--wood); font-size: 1.5rem;}

        .back-link { 
            display: inline-block; margin: 30px 0; 
            color: var(--primary-red); text-decoration: none; 
            font-weight: bold; border-bottom: 2px solid var(--primary-red);
        }

        /* Floating Music Button Responsive */
        .music-control {
            position: fixed; bottom: 20px; right: 20px;
            background-color: var(--gold); color: var(--primary-red);
            padding: 10px 15px; border-radius: 50px;
            cursor: pointer; display: flex; align-items: center;
            gap: 8px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000; font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>අවුරුදු කැට ගැසීම</h1>
    
    <div class="game-area">
        <div class="bet-container">
            <span class="bet-title">ඔබේ අංකය තෝරන්න:</span>
            <div class="bet-buttons">
                <button class="bet-btn" onclick="selectNumber(1)">1</button>
                <button class="bet-btn" onclick="selectNumber(2)">2</button>
                <button class="bet-btn" onclick="selectNumber(3)">3</button>
                <button class="bet-btn" onclick="selectNumber(4)">4</button>
                <button class="bet-btn" onclick="selectNumber(5)">5</button>
                <button class="bet-btn" onclick="selectNumber(6)">6</button>
            </div>
        </div>

        <div class="keta-display">
            <div id="ketaResult">🎲</div>
            <div id="resultMessage">
                <span id="outcomeText"></span>
                <span id="pointsText"></span>
            </div>
        </div>

        <button class="btn-toss" id="tossBtn" onclick="tossKeta()">කැටය පෙරළමු! 🎲</button>

        <div class="score-board">
            වාසනා ලකුණු: <span id="pointsCount">100</span>
        </div>
    </div>

    <a href="games.html" class="back-link">← ආපසු මණ්ඩපයට</a>
</div>

<audio id="avuruduAudio" loop><source src="avurudu_song.mp3" type="audio/mpeg"></audio>

<div class="music-control" onclick="toggleMusic()">
    <span id="musicIcon">🎵</span>
    <span id="musicText">Music</span>
</div>

<script>
    let selectedNumber = 0;
    let currentPoints = 100;
    let isRolling = false;

    const ketaDisplay = document.getElementById('ketaResult');
    const tossBtn = document.getElementById('tossBtn');
    const pointsCount = document.getElementById('pointsCount');
    const resultMsg = document.getElementById('resultMessage');
    const outcomeText = document.getElementById('outcomeText');
    const pointsText = document.getElementById('pointsText');

    // කැටයේ මුහුණත් (Emojis)
    const ketaFaces = ['🎲', '⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

    function selectNumber(num) {
        if (isRolling) return;
        selectedNumber = num;
        
        // පැරණි සිලෙක්ට් අයින් කිරීම
        document.querySelectorAll('.bet-btn').forEach(btn => btn.classList.remove('selected'));
        
        // අලුත් සිලෙක්ට් එක එකතු කිරීම
        document.querySelectorAll('.bet-btn')[num-1].classList.add('selected');
        
        // ටොස් බටන් එක Enable කිරීම
        tossBtn.disabled = false;
        resultMsg.style.display = 'none';
    }

    function tossKeta() {
        if (selectedNumber === 0 || isRolling) return;
        isRolling = true;
        tossBtn.disabled = true;
        resultMsg.style.display = 'none';
        
        // ඇනිමේෂන් එක පටන් ගැනීම
        ketaDisplay.classList.add('keta-rolling');
        ketaDisplay.innerText = '🎲';
        
        // තත්පර 1.5ක් රෝල් කිරීම
        setTimeout(() => {
            // ඇනිමේෂන් එක නැවැත්වීම
            ketaDisplay.classList.remove('keta-rolling');
            
            // අහඹු අංකයක් ලබා ගැනීම (1-6)
            const resultNum = Math.floor(Math.random() * 6) + 1;
            ketaDisplay.innerText = ketaFaces[resultNum];
            
            // ජයග්‍රහණය පරීක්ෂා කිරීම
            checkWin(resultNum);
            
            isRolling = false;
        }, 1500);
    }

    function checkWin(result) {
        let outcome, pointsChange;
        
        if (result === selectedNumber) {
            // ජයග්‍රහණය (ලකුණු 50ක් එකතු වේ)
            outcome = "සුභ පැතුම්! ඔබ දිනුවා! 🎉";
            pointsChange = 50;
            outcomeText.style.color = "#27ae60";
        } else {
            // පරාජය (ලකුණු 10ක් අඩු වේ)
            outcome = "අයියෝ! වැරදියි. ❌";
            pointsChange = -10;
            outcomeText.style.color = "#c0392b";
        }

        currentPoints += pointsChange;
        if (currentPoints < 0) currentPoints = 0;
        pointsCount.innerText = currentPoints;

        outcomeText.innerText = outcome;
        pointsText.innerText = (pointsChange > 0 ? "+" : "") + pointsChange + " ලකුණු";
        pointsText.style.color = pointsChange > 0 ? "#27ae60" : "#c0392b";
        
        resultMsg.style.display = 'flex';
        
        // නැවත ක්‍රීඩා කිරීමට සූදානම් කිරීම (සිලෙක්ට් එක අයින් කිරීම)
        selectedNumber = 0;
        document.querySelectorAll('.bet-btn').forEach(btn => btn.classList.remove('selected'));
    }

    // Music Control Logic
    const audio = document.getElementById("avuruduAudio");
    const musicIcon = document.getElementById("musicIcon");

    function toggleMusic() {
        if (audio.paused) {
            audio.play(); localStorage.setItem("musicPlaying", "true"); musicIcon.innerText = "⏸️";
        } else {
            audio.pause(); localStorage.setItem("musicPlaying", "false"); musicIcon.innerText = "🎵";
        }
    }

    window.addEventListener("load", () => {
        const isPlaying = localStorage.getItem("musicPlaying") === "true";
        const lastTime = localStorage.getItem("musicTime");
        if (lastTime) audio.currentTime = parseFloat(lastTime);
        if (isPlaying) { audio.play().catch(() => {}); musicIcon.innerText = "⏸️"; }
        tossBtn.disabled = true; // ආරම්භයේදී අංකයක් තෝරන තෙක් Toss disable වේ
    });

    audio.addEventListener("timeupdate", () => localStorage.setItem("musicTime", audio.currentTime));
</script>
</body>
</html>
