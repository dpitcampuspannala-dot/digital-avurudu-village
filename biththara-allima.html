<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>බිත්තර ඇල්ලීම Pro - ඩිජිටල් අවුරුදු ගම්මානය</title>
    <style>
        :root {
            --primary-red: #8b0000;
            --gold: #f1c40f;
            --grass: #27ae60;
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #fdf2e9; 
            text-align: center; 
            color: #333; 
            overflow: hidden; 
            touch-action: none; /* Screen scroll වැළැක්වීමට */
        }

        .container { 
            width: 100%; 
            max-width: 600px; 
            margin: 0 auto; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            position: relative;
        }
        
        /* Menu Screen */
        #menuScreen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fdf2e9; z-index: 20; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .menu-title { color: var(--primary-red); font-size: clamp(2rem, 8vw, 3rem); margin-bottom: 30px; }
        
        /* Header & Scoreboard */
        .game-header { 
            background: var(--primary-red); color: white; 
            padding: 10px; border-radius: 0 0 20px 20px; 
            display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
        }
        .game-header h2 { margin: 5px 0; font-size: 1.2rem; }
        .game-header p { margin: 0; font-size: 0.9rem; opacity: 0.9; }

        .score-board { 
            display: none; justify-content: space-around; 
            background: white; padding: 10px; 
            font-weight: bold; font-size: 0.9rem;
            border-bottom: 2px solid var(--gold);
        }
        #score { color: var(--grass); font-size: 1.2rem; }
        #missed { color: #c0392b; font-size: 1.2rem; }

        /* Game Area */
        #gameArea { 
            flex-grow: 1; 
            background-color: #eafaf1; 
            position: relative; 
            overflow: hidden; 
            cursor: crosshair; 
            border-left: 4px solid var(--gold);
            border-right: 4px solid var(--gold);
        }
        
        #basket { 
            width: clamp(60px, 15vw, 90px); 
            height: 40px; 
            position: absolute; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            font-size: clamp(40px, 12vw, 60px); 
            display: flex; justify-content: center; align-items: center;
            pointer-events: none; 
            z-index: 5;
        }

        .egg { 
            position: absolute; 
            font-size: clamp(25px, 8vw, 35px); 
            user-select: none;
        }

        /* Overlays */
        .overlay { 
            display: none; position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.85); 
            color: white; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 15; padding: 20px; box-sizing: border-box; 
        }
        
        /* Buttons */
        .btn { 
            background-color: var(--grass); color: white; 
            padding: 15px 0; width: 80%; max-width: 250px;
            border: none; border-radius: 50px; font-weight: bold; 
            cursor: pointer; font-size: 1.1rem; margin: 10px; 
            transition: 0.2s; box-shadow: 0 4px 0 #1e8449;
        }
        .btn-orange { background-color: #e67e22; box-shadow: 0 4px 0 #d35400; }
        .btn-red { background-color: var(--primary-red); box-shadow: 0 4px 0 #5e0000; }
        .btn:active { transform: translateY(2px); box-shadow: none; }

        .back-link { color: var(--primary-red); text-decoration: none; font-weight: bold; margin-top: 20px; border-bottom: 2px solid var(--primary-red); }

        .music-control {
            position: fixed; bottom: 20px; right: 20px;
            background-color: var(--gold); color: var(--primary-red);
            padding: 10px 15px; border-radius: 50px;
            cursor: pointer; display: flex; align-items: center;
            gap: 8px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000; font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="menuScreen">
        <h1 class="menu-title">බිත්තර ඇල්ලීම</h1>
        <button class="btn" onclick="startMode('missions')">Missions 10</button>
        <button class="btn btn-orange" onclick="startMode('unlimited')">Unlimited Play</button>
        <a href="games.html" class="back-link">← ආපසු ක්‍රීඩා මණ්ඩපයට</a>
    </div>

    <div class="game-header" id="gameHeader">
        <h2 id="mTitle">Mission Mode</h2>
        <p id="mDesc">බිත්තර 5ක් අල්ලාගන්න.</p>
    </div>

    <div class="score-board" id="scoreBoard">
        <div>ලකුණු: <span id="score">0</span></div>
        <div id="targetContainer">ඉලක්කය: <span id="target">0</span></div>
        <div>බිඳුණු: <span id="missed">0</span>/5</div>
    </div>

    <div id="gameArea">
        <div id="basket">🧺</div>
        
        <div id="statusOverlay" class="overlay">
            <h2 id="statusTitle">විශිෂ්ටයි!</h2>
            <p id="statusMsg">ඔබ මෙම මට්ටම ජයග්‍රහණය කළා.</p>
            <button class="btn" id="actionBtn" onclick="handleAction()">ඊළඟ Mission එක</button>
            <button class="btn btn-red" onclick="exitToMenu()">Menu එකට යන්න</button>
        </div>
    </div>
</div>

<audio id="avuruduAudio" loop><source src="avurudu_song.mp3" type="audio/mpeg"></audio>

<div class="music-control" onclick="toggleMusic()">
    <span id="musicIcon">🎵</span>
    <span id="musicText">Music</span>
</div>

<script>
    const missions = [
        { title: "Mission 1", target: 5, speed: 3, interval: 1500 },
        { title: "Mission 2", target: 10, speed: 3.5, interval: 1300 },
        { title: "Mission 3", target: 15, speed: 4, interval: 1100 },
        { title: "Mission 4", target: 20, speed: 4.5, interval: 1000 },
        { title: "Mission 5", target: 25, speed: 5, interval: 950 },
        { title: "Mission 6", target: 30, speed: 5.5, interval: 900 },
        { title: "Mission 7", target: 40, speed: 6, interval: 850 },
        { title: "Mission 8", target: 50, speed: 6.5, interval: 800 },
        { title: "Mission 9", target: 60, speed: 7, interval: 750 },
        { title: "Mission 10", target: 80, speed: 8, interval: 650 }
    ];

    let currentMode = ''; 
    let currentMIdx = 0;
    let score = 0, missed = 0;
    let gameActive = false;
    let eggInterval, gameLoop;
    let eggs = [];
    let currentSpeed = 3;
    let currentSpawnRate = 1500;
    const maxMissed = 5;

    function startMode(mode) {
        currentMode = mode;
        document.getElementById('menuScreen').style.display = 'none';
        document.getElementById('gameHeader').style.display = 'block';
        document.getElementById('scoreBoard').style.display = 'flex';
        
        if (mode === 'missions') {
            currentMIdx = 0;
            document.getElementById('targetContainer').style.display = 'block';
            initMission();
        } else {
            document.getElementById('targetContainer').style.display = 'none';
            initUnlimited();
        }
    }

    function initMission() {
        const m = missions[currentMIdx];
        score = 0; missed = 0;
        currentSpeed = m.speed;
        currentSpawnRate = m.interval;
        setupGameState(m.title, `බිත්තර ${m.target}ක් අල්ලාගන්න.`, m.target);
    }

    function initUnlimited() {
        score = 0; missed = 0;
        currentSpeed = 3;
        currentSpawnRate = 1500;
        setupGameState("Unlimited Play", "බිත්තර 5ක් වැටෙන්න නොදී අල්ලාගන්න.", "∞");
    }

    function setupGameState(title, desc, target) {
        eggs.forEach(e => e.remove());
        eggs = [];
        gameActive = true;
        document.getElementById('mTitle').innerText = title;
        document.getElementById('mDesc').innerText = desc;
        document.getElementById('score').innerText = score;
        document.getElementById('target').innerText = target;
        document.getElementById('missed').innerText = missed;
        document.getElementById('statusOverlay').style.display = 'none';
        
        clearInterval(eggInterval);
        cancelAnimationFrame(gameLoop);
        eggInterval = setInterval(createEgg, currentSpawnRate);
        gameLoop = requestAnimationFrame(updateGame);
    }

    function createEgg() {
        if (!gameActive) return;
        const egg = document.createElement('div');
        egg.className = 'egg';
        egg.innerText = '🥚';
        const areaWidth = document.getElementById('gameArea').clientWidth;
        const randomX = Math.floor(Math.random() * (areaWidth - 50)) + 25;
        egg.style.left = randomX + 'px';
        egg.style.top = '-50px';
        document.getElementById('gameArea').appendChild(egg);
        eggs.push(egg);
    }

    function updateGame() {
        if (!gameActive) return;
        const basket = document.getElementById('basket');
        const basketRect = basket.getBoundingClientRect();
        const areaRect = document.getElementById('gameArea').getBoundingClientRect();

        for (let i = eggs.length - 1; i >= 0; i--) {
            const egg = eggs[i];
            let top = parseFloat(egg.style.top) + currentSpeed;
            egg.style.top = top + 'px';
            
            const eggRect = egg.getBoundingClientRect();

            // Catching Logic
            if (eggRect.bottom > basketRect.top && 
                eggRect.right > basketRect.left && 
                eggRect.left < basketRect.right && 
                eggRect.top < basketRect.bottom) {
                
                score++;
                document.getElementById('score').innerText = score;
                egg.remove();
                eggs.splice(i, 1);
                
                if (currentMode === 'missions' && score >= missions[currentMIdx].target) {
                    winMission();
                    return;
                }
                
                if (currentMode === 'unlimited' && score % 10 === 0) {
                    currentSpeed += 0.3;
                    if (currentSpawnRate > 600) {
                        currentSpawnRate -= 50;
                        clearInterval(eggInterval);
                        eggInterval = setInterval(createEgg, currentSpawnRate);
                    }
                }
                continue;
            }

            // Ground Collision Logic
            if (eggRect.bottom > areaRect.bottom) {
                missed++;
                document.getElementById('missed').innerText = missed;
                egg.innerText = '💥';
                eggs.splice(i, 1);
                setTimeout(() => egg.remove(), 400);

                if (missed >= maxMissed) {
                    gameOver();
                    return;
                }
            }
        }
        gameLoop = requestAnimationFrame(updateGame);
    }

    function winMission() {
        gameActive = false;
        clearInterval(eggInterval);
        const overlay = document.getElementById('statusOverlay');
        const title = document.getElementById('statusTitle');
        const btn = document.getElementById('actionBtn');
        
        title.innerText = "විශිෂ්ටයි!";
        title.style.color = "#2ecc71";
        
        if (currentMIdx < missions.length - 1) {
            document.getElementById('statusMsg').innerText = `Mission ${currentMIdx + 1} සාර්ථකයි.`;
            btn.innerText = "ඊළඟ Mission එක";
            btn.style.display = "inline-block";
        } else {
            document.getElementById('statusMsg').innerText = "ඔබ සියලුම මිෂන් ජයග්‍රහණය කළා! 🏆";
            btn.style.display = "none";
        }
        overlay.style.display = 'flex';
    }

    function gameOver() {
        gameActive = false;
        clearInterval(eggInterval);
        const overlay = document.getElementById('statusOverlay');
        const title = document.getElementById('statusTitle');
        const btn = document.getElementById('actionBtn');
        
        title.innerText = "අපොයි!";
        title.style.color = "#e74c3c";
        document.getElementById('statusMsg').innerText = (currentMode === 'unlimited') ? `ඔබේ ලකුණු: ${score}` : "බිත්තර 5ක්ම බිඳුණා. නැවත උත්සාහ කරන්න.";
        btn.innerText = "නැවත පටන් ගන්න";
        btn.style.display = "inline-block";
        overlay.style.display = 'flex';
    }

    function handleAction() {
        const title = document.getElementById('statusTitle').innerText;
        if (title === "විශිෂ්ටයි!") {
            currentMIdx++;
            initMission();
        } else {
            if (currentMode === 'missions') initMission();
            else initUnlimited();
        }
    }

    function exitToMenu() {
        gameActive = false;
        clearInterval(eggInterval);
        cancelAnimationFrame(gameLoop);
        document.getElementById('menuScreen').style.display = 'flex';
        document.getElementById('gameHeader').style.display = 'none';
        document.getElementById('scoreBoard').style.display = 'none';
        document.getElementById('statusOverlay').style.display = 'none';
    }

    // Basket Controls (Mouse & Touch)
    function moveBasket(e) {
        if (!gameActive) return;
        let x;
        if (e.type.includes('touch')) {
            x = e.touches[0].clientX;
        } else {
            x = e.clientX;
        }
        
        const area = document.getElementById('gameArea');
        const rect = area.getBoundingClientRect();
        const basket = document.getElementById('basket');
        const basketWidth = basket.offsetWidth;
        
        let relX = x - rect.left;
        
        // සීමාවන් තුළ තබා ගැනීම
        if (relX < basketWidth/2) relX = basketWidth/2;
        if (relX > rect.width - basketWidth/2) relX = rect.width - basketWidth/2;
        
        basket.style.left = relX + 'px';
    }

    document.getElementById('gameArea').addEventListener('mousemove', moveBasket);
    document.getElementById('gameArea').addEventListener('touchmove', (e) => {
        e.preventDefault(); // Scroll වැළැක්වීමට
        moveBasket(e);
    }, {passive: false});

    // Music
    const audio = document.getElementById("avuruduAudio");
    const musicIcon = document.getElementById("musicIcon");

    function toggleMusic() {
        if (audio.paused) {
            audio.play(); localStorage.setItem("musicPlaying", "true"); musicIcon.innerText = "⏸️";
        } else {
            audio.pause(); localStorage.setItem("musicPlaying", "false"); musicIcon.innerText = "🎵";
        }
    }

    window.addEventListener("load", () => {
        const isPlaying = localStorage.getItem("musicPlaying") === "true";
        if (isPlaying) { audio.play().catch(() => {}); musicIcon.innerText = "⏸️"; }
    });
</script>
</body>
</html>
