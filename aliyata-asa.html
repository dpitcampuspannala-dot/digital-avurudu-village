<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>අලියාට ඇස තැබීම - ඩිජිටල් අවුරුදු</title>
    <style>
        :root {
            --primary-green: #2e7d32;
            --accent-orange: #ef6c00;
            --elephant-gray: #95a5a6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f1f8e9;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header Info Responsive */
        .header-info {
            width: 90%;
            max-width: 500px;
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 20px;
            border-radius: 20px;
            margin: 15px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 2px solid var(--primary-green);
            z-index: 20;
        }
        .header-info h2 { margin: 5px 0; font-size: clamp(1.2rem, 4vw, 1.8rem); color: var(--primary-green); }
        .header-info p { margin: 5px 0; font-size: clamp(0.9rem, 3vw, 1.1rem); font-weight: bold; }

        /* Game Area Responsive (4:3 Aspect Ratio) */
        #game-container {
            position: relative;
            width: 95vw;
            max-width: 600px;
            aspect-ratio: 4 / 3;
            background-color: #ffffff;
            border: 8px solid #5d4037;
            border-radius: 20px;
            cursor: crosshair;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none; /* Mobile scroll වැළැක්වීමට */
        }

        #elephant-svg {
            width: 100%;
            height: 100%;
            transition: opacity 0.5s;
        }

        #blindfold {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #121212;
            display: none;
            justify-content: center;
            align-items: center;
            color: #ffca28;
            font-size: clamp(1rem, 5vw, 1.8rem);
            font-weight: bold;
            z-index: 10;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* ඇස් සලකුණු (Responsive Size) */
        .eye {
            position: absolute;
            width: clamp(15px, 4vw, 22px);
            height: clamp(15px, 4vw, 22px);
            border-radius: 50%;
            display: none;
            z-index: 5;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transform: translate(-50%, -50%); /* මැදටම සෙට් වෙන්න */
        }

        #target-eye { background: #ff1744; border: 2px solid white; } 
        #player-eye { background: #212121; border: 2px solid white; } 

        /* Controls */
        .controls {
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
        }

        .btn { 
            padding: 12px 30px; 
            font-size: 1.1rem; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            color: white; 
            box-shadow: 0 5px #777;
            width: 80%;
            max-width: 280px;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px #777; }
        
        .start-btn { background-color: var(--accent-orange); }
        #next-btn { display: none; background-color: var(--primary-green); }
        
        .back-link { margin-bottom: 30px; color: var(--primary-green); text-decoration: none; font-weight: bold; border-bottom: 2px solid var(--primary-green); }

        /* Music */
        .music-control {
            position: fixed; bottom: 20px; right: 20px;
            background-color: #f1c40f; color: #8b0000;
            padding: 10px 15px; border-radius: 50px;
            cursor: pointer; display: flex; align-items: center;
            gap: 8px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000; font-size: 0.8rem;
        }

        /* Landscape fix for mobile */
        @media (max-height: 500px) {
            #game-container { max-width: 400px; }
            .header-info { margin: 5px 0; padding: 5px; }
        }
    </style>
</head>
<body>

    <div class="header-info">
        <h2 id="mission-title">මිෂන් 1</h2>
        <p id="message">අලියාගේ ඇස තියන තැන බලාගන්න!</p>
    </div>

    <div id="game-container" onclick="placeEye(event)" ontouchstart="handleTouch(event)">
        <svg id="elephant-svg" viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg">
            <rect x="300" y="320" width="60" height="90" rx="10" fill="#7f8c8d" />
            <rect x="420" y="320" width="60" height="90" rx="10" fill="#7f8c8d" />
            <ellipse cx="400" cy="250" rx="160" ry="110" fill="#95a5a6" />
            <circle cx="220" cy="200" r="95" fill="#95a5a6" />
            <ellipse cx="300" cy="180" rx="70" ry="100" fill="#7f8c8d" />
            <path d="M140,230 Q40,230 40,320 Q40,380 90,370" fill="none" stroke="#95a5a6" stroke-width="35" stroke-linecap="round" />
            <path d="M550,230 Q580,230 580,280" fill="none" stroke="#7f8c8d" stroke-width="6" />
        </svg>

        <div id="blindfold">දැන් මතකයෙන් ඇස තියන්න! 🙈</div>
        
        <div id="target-eye" class="eye"></div>
        <div id="player-eye" class="eye"></div>
    </div>

    <div class="controls">
        <button id="start-btn" class="btn start-btn" onclick="startBlindfold()">ඇස තැබීම ආරම්භ කරන්න</button>
        <button id="next-btn" class="btn" onclick="startNextMission()">ඊළඟ මිෂන් එක →</button>
        <a href="games.html" class="back-link">← ආපසු මණ්ඩපයට</a>
    </div>

    <audio id="avuruduAudio" loop><source src="avurudu_song.mp3" type="audio/mpeg"></audio>

    <div class="music-control" onclick="toggleMusic()">
        <span id="musicIcon">🎵</span>
        <span id="musicText">Music</span>
    </div>

    <script>
        let currentMission = 1;
        let canPlace = false;

        // 🎯 නිවැරදි ස්ථානය ප්‍රතිශතයක් ලෙස (600x450 අනුපාතයට අනුව)
        const targetXPercent = (180 / 600) * 100; // 30%
        const targetYPercent = (155 / 450) * 100; // 34.44%

        const missions = [
            { preview: 4000, tolerance: 7 }, // Tolerance දැන් ප්‍රතිශතයක් ලෙස
            { preview: 3000, tolerance: 6 },
            { preview: 2500, tolerance: 5 },
            { preview: 2000, tolerance: 4.5 },
            { preview: 1500, tolerance: 4 },
            { preview: 1200, tolerance: 3.5 },
            { preview: 1000, tolerance: 3 },
            { preview: 800, tolerance: 2.5 },
            { preview: 600, tolerance: 2 },
            { preview: 400, tolerance: 1.5 }
        ];

        function startBlindfold() {
            const elephant = document.getElementById('elephant-svg');
            const blindfold = document.getElementById('blindfold');
            const startBtn = document.getElementById('start-btn');
            
            startBtn.style.visibility = "hidden";
            document.getElementById('message').innerText = "මතක තබා ගන්න...";

            setTimeout(() => {
                elephant.style.opacity = "0";
                blindfold.style.display = "flex";
                canPlace = true;
                document.getElementById('message').innerText = "දැන් ඇස තියන්න!";
            }, missions[currentMission - 1].preview);
        }

        // Mobile touch support
        function handleTouch(e) {
            if (canPlace) {
                const touch = e.touches[0];
                processClick(touch.clientX, touch.clientY);
            }
        }

        function placeEye(e) {
            if (canPlace) {
                processClick(e.clientX, e.clientY);
            }
        }

        function processClick(clientX, clientY) {
            const container = document.getElementById('game-container');
            const rect = container.getBoundingClientRect();
            
            // ක්ලික් කළ ස්ථානය ප්‍රතිශතයක් ලෙස ගණනය කිරීම
            const clickXPercent = ((clientX - rect.left) / rect.width) * 100;
            const clickYPercent = ((clientY - rect.top) / rect.height) * 100;

            const playerEye = document.getElementById('player-eye');
            playerEye.style.left = clickXPercent + "%";
            playerEye.style.top = clickYPercent + "%";
            playerEye.style.display = "block";

            const targetEye = document.getElementById('target-eye');
            targetEye.style.left = targetXPercent + "%";
            targetEye.style.top = targetYPercent + "%";
            targetEye.style.display = "block";

            document.getElementById('elephant-svg').style.opacity = "1";
            document.getElementById('blindfold').style.display = "none";
            
            canPlace = false;
            checkResult(clickXPercent, clickYPercent);
        }

        function checkResult(px, py) {
            // පයිතගරස් ප්‍රමේයය භාවිතයෙන් දුර ගණනය කිරීම (ප්‍රතිශත ඒකක වලින්)
            const distance = Math.sqrt(Math.pow(px - targetXPercent, 2) + Math.pow(py - targetYPercent, 2));
            const tolerance = missions[currentMission - 1].tolerance;

            const msg = document.getElementById('message');
            if (distance <= tolerance) {
                msg.innerText = "නියමයි! නිවැරදියි! 🎉";
                msg.style.color = "#2e7d32";
                if (currentMission < 10) {
                    document.getElementById('next-btn').style.display = "block";
                } else {
                    msg.innerText = "ඔබ අලියාට ඇස තැබීමේ ශූරයෙක්! 🏆";
                }
            } else {
                msg.innerText = "වැරදියි! නැවත උත්සාහ කරන්න. ❌";
                msg.style.color = "#d32f2f";
                setTimeout(resetMission, 2000);
            }
        }

        function resetMission() {
            document.getElementById('player-eye').style.display = "none";
            document.getElementById('target-eye').style.display = "none";
            document.getElementById('start-btn').style.visibility = "visible";
            document.getElementById('message').innerText = "සූදානම් වන්න!";
            document.getElementById('message').style.color = "black";
            canPlace = false;
        }

        function startNextMission() {
            currentMission++;
            document.getElementById('mission-title').innerText = "මිෂන් " + currentMission;
            document.getElementById('next-btn').style.display = "none";
            resetMission();
        }

        // Music Logic
        const audio = document.getElementById("avuruduAudio");
        const musicIcon = document.getElementById("musicIcon");

        function toggleMusic() {
            if (audio.paused) {
                audio.play(); localStorage.setItem("musicPlaying", "true"); musicIcon.innerText = "⏸️";
            } else {
                audio.pause(); localStorage.setItem("musicPlaying", "false"); musicIcon.innerText = "🎵";
            }
        }

        window.addEventListener("load", () => {
            const isPlaying = localStorage.getItem("musicPlaying") === "true";
            if (isPlaying) { audio.play().catch(() => {}); musicIcon.innerText = "⏸️"; }
        });
    </script>
</body>
</html>
