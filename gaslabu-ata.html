<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ගස්ලබු මිෂන් 10 - ඩිජිටල් අවුරුදු ගම්මානය</title>
    <style>
        :root {
            --primary-red: #8b0000;
            --accent-gold: #f1c40f;
            --success-green: #27ae60;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background-color: #fdf2e9;
            text-align: center;
            color: #333;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { 
            width: 95%; 
            max-width: 600px; 
            margin: 20px auto; 
            padding: 10px;
            box-sizing: border-box;
        }
        
        /* Mission Display */
        .mission-status {
            background: var(--primary-red);
            color: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .mission-status h2 { margin: 0 0 10px 0; font-size: 1.5rem; }
        .mission-status p { margin: 0; font-size: 1rem; opacity: 0.9; }

        .game-box {
            background: white;
            padding: clamp(20px, 5vw, 40px);
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 4px solid var(--accent-gold);
        }

        .papaya-img { 
            font-size: clamp(60px, 15vw, 90px); 
            margin-bottom: 20px; 
            display: inline-block;
            transition: transform 0.3s; 
        }
        .papaya-img:hover { transform: scale(1.1) rotate(5deg); }
        
        .input-group { margin-bottom: 20px; }

        input[type="number"] {
            padding: 15px;
            width: 80%;
            max-width: 200px;
            border-radius: 12px;
            border: 2px solid #ddd;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="number"]:focus { border-color: var(--primary-red); }

        /* Buttons Style */
        .btn {
            background-color: var(--success-green);
            color: white;
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
            margin: 8px;
            transition: 0.3s;
            box-shadow: 0 4px 0 #219150;
            touch-action: manipulation;
        }

        .btn:hover { background-color: #219150; transform: translateY(-2px); }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        
        .btn-next { background-color: #e67e22; box-shadow: 0 4px 0 #d35400; display: none; }
        .btn-reset { background-color: #c0392b; box-shadow: 0 4px 0 #962d22; display: none; }

        #message {
            margin: 20px 0;
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 50px;
            line-height: 1.4;
        }

        .hint { color: #d35400; }
        .success { color: var(--success-green); }
        .fail { color: #c0392b; }

        .stats { 
            margin-top: 20px; 
            font-size: 1rem; 
            color: #666; 
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--primary-red);
            text-decoration: none;
            font-weight: bold;
            border-bottom: 2px solid var(--primary-red);
            padding-bottom: 2px;
        }

        /* Floating Music Toggle */
        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--accent-gold);
            color: var(--primary-red);
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            font-size: 0.9rem;
        }

        @media (max-width: 480px) {
            .mission-status { padding: 15px; }
            .game-box { padding: 20px; }
            .btn { width: 100%; margin: 5px 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="mission-status">
            <h2 id="missionTitle">Mission 1</h2>
            <p id="missionDesc">පූරණය වෙමින්...</p>
        </div>
        
        <div class="game-box">
            <div class="papaya-img">🍈</div>
            
            <div class="input-group">
                <input type="number" id="userGuess" placeholder="අංකය..." min="1">
            </div>

            <button class="btn" id="guessBtn" onclick="checkGuess()">අනුමාන කරන්න</button>
            <button class="btn btn-next" id="nextBtn" onclick="nextMission()">ඊළඟ Mission එක</button>
            <button class="btn btn-reset" id="resetBtn" onclick="initGame()">නැවත උත්සාහ කරන්න</button>
            
            <div id="message"></div>
            <div class="stats" id="stats">උත්සාහයන්: 0 | ඉතිරි වට: 0</div>
        </div>

        <audio id="avuruduAudio" loop><source src="avurudu_song.mp3" type="audio/mpeg"></audio>

        <div class="music-control" onclick="toggleMusic()">
            <span id="musicIcon">🎵</span>
            <span id="musicText">Music</span>
        </div>

        <a href="games.html" class="back-link">← ආපසු ක්‍රීඩා මණ්ඩපයට</a>
    </div>

    <script>
        const missions = [
            { title: "Mission 1: කුඩා ගෙඩිය", desc: "වට 10ක් ඇතුළත 1-50 අතර ඇට ගණන අනුමාන කරන්න.", max: 50, attempts: 10 },
            { title: "Mission 2: සාමාන්‍ය ගෙඩිය", desc: "වට 10ක් ඇතුළත 1-100 අතර ඇට ගණන අනුමාන කරන්න.", max: 100, attempts: 10 },
            { title: "Mission 3: ටිකක් ලොකු ගෙඩිය", desc: "වට 9ක් ඇතුළත 1-150 අතර ඇට ගණන අනුමාන කරන්න.", max: 150, attempts: 9 },
            { title: "Mission 4: පවුලේ ගෙඩිය", desc: "වට 9ක් ඇතුළත 1-200 අතර ඇට ගණන අනුමාන කරන්න.", max: 200, attempts: 9 },
            { title: "Mission 5: උත්සව ගෙඩිය", desc: "වට 8ක් ඇතුළත 1-250 අතර ඇට ගණන අනුමාන කරන්න.", max: 250, attempts: 8 },
            { title: "Mission 6: රජ ගෙඩිය", desc: "වට 8ක් ඇතුළත 1-300 අතර ඇට ගණන අනුමාන කරන්න.", max: 300, attempts: 8 },
            { title: "Mission 7: අභියෝගාත්මක ගෙඩිය", desc: "වට 7ක් ඇතුළත 1-400 අතර ඇට ගණන අනුමාන කරන්න.", max: 400, attempts: 7 },
            { title: "Mission 8: මහා ගෙඩිය", desc: "වට 7ක් ඇතුළත 1-500 අතර ඇට ගණන අනුමාන කරන්න.", max: 500, attempts: 7 },
            { title: "Mission 9: විශේෂඥ ගෙඩිය", desc: "වට 6ක් ඇතුළත 1-750 අතර ඇට ගණන අනුමාන කරන්න.", max: 750, attempts: 6 },
            { title: "Mission 10: අවසන් මහා ගෙඩිය", desc: "වට 5ක් ඇතුළත 1-1000 අතර ඇට ගණන අනුමාන කරන්න!", max: 1000, attempts: 5 }
        ];

        let currentMissionIdx = 0;
        let targetSeeds, remainingAttempts, totalAttempts;

        function initGame() {
            const m = missions[currentMissionIdx];
            targetSeeds = Math.floor(Math.random() * m.max) + 1;
            remainingAttempts = m.attempts;
            totalAttempts = 0;
            
            document.getElementById('missionTitle').innerText = m.title;
            document.getElementById('missionDesc').innerText = m.desc;
            document.getElementById('stats').innerText = `උත්සාහයන්: 0 | ඉතිරි වට: ${remainingAttempts}`;
            document.getElementById('message').innerHTML = "";
            
            document.getElementById('nextBtn').style.display = "none";
            document.getElementById('resetBtn').style.display = "none";
            document.getElementById('guessBtn').style.display = "inline-block";
            
            const input = document.getElementById('userGuess');
            input.value = "";
            input.disabled = false;
            input.placeholder = `1-${m.max}`;
        }

        function checkGuess() {
            const inputEl = document.getElementById('userGuess');
            const guess = parseInt(inputEl.value);
            const msg = document.getElementById('message');
            const m = missions[currentMissionIdx];
            
            if (isNaN(guess) || guess < 1 || guess > m.max) {
                msg.innerHTML = `<span class="fail">1 ත් ${m.max} ත් අතර අංකයක් දමන්න!</span>`;
                return;
            }

            totalAttempts++;
            remainingAttempts--;

            if (guess === targetSeeds) {
                if (currentMissionIdx === missions.length - 1) {
                    msg.innerHTML = `<span class="success">නියමයි! 🏆 ඔයා අවසන් මහා මිෂන් එකත් දිනුවා! 🎉</span>`;
                } else {
                    msg.innerHTML = `<span class="success">සුභ පැතුම්! 🎉 Mission ${currentMissionIdx + 1} දිනුවා!</span>`;
                }
                endGame(true);
            } else if (remainingAttempts === 0) {
                msg.innerHTML = `<span class="fail">අපොයි! පැරදුණා. <br> නිවැරදි අංකය: ${targetSeeds}</span>`;
                endGame(false);
            } else {
                let hint = guess < targetSeeds ? "වැඩියි" : "අඩුයි";
                msg.innerHTML = `<span class="hint">වැරදියි, මීට වඩා ඇට ගණන ${hint}!</span>`;
            }

            document.getElementById('stats').innerText = `උත්සාහයන්: ${totalAttempts} | ඉතිරි වට: ${remainingAttempts}`;
            inputEl.value = "";
        }

        function endGame(isWin) {
            document.getElementById('userGuess').disabled = true;
            document.getElementById('guessBtn').style.display = "none";
            if (isWin) {
                if (currentMissionIdx < missions.length - 1) {
                    document.getElementById('nextBtn').style.display = "inline-block";
                }
            } else {
                document.getElementById('resetBtn').style.display = "inline-block";
            }
        }

        function nextMission() {
            if (currentMissionIdx < missions.length - 1) {
                currentMissionIdx++;
                initGame();
            }
        }

        initGame();

        // Music Logic
        const audio = document.getElementById("avuruduAudio");
        const musicIcon = document.getElementById("musicIcon");

        window.addEventListener("load", () => {
            const isPlaying = localStorage.getItem("musicPlaying") === "true";
            const lastTime = localStorage.getItem("musicTime");
            if (lastTime) audio.currentTime = parseFloat(lastTime);
            if (isPlaying) {
                audio.play().then(() => updateUI(true)).catch(() => {});
            }
        });

        audio.addEventListener("timeupdate", () => {
            localStorage.setItem("musicTime", audio.currentTime);
        });

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                localStorage.setItem("musicPlaying", "true");
                updateUI(true);
            } else {
                audio.pause();
                localStorage.setItem("musicPlaying", "false");
                updateUI(false);
            }
        }

        function updateUI(isPlaying) {
            musicIcon.innerText = isPlaying ? "⏸️" : "🎵";
        }
    </script>
</body>
</html>
